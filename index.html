<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인주회중 야외봉사 앱 - 실사용 통합판</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif;background:#f4f7fb;color:#111}
header{background:#153b63;color:#fff;text-align:center;padding:12px 8px;font-weight:900;font-size:20px}
.sub{font-size:13px;opacity:.9;margin-top:3px}
.wrap{max-width:1100px;margin:0 auto;padding:8px}
.panel{background:#fff;border-radius:16px;padding:10px;margin-bottom:8px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.tab{border:0;border-radius:11px;padding:10px 4px;font-weight:900;background:#e8eef7;color:#153b63;font-size:13px}
.tab.active{background:#153b63;color:#fff}
#map{height:47vh;min-height:330px;width:100%;border-radius:16px;border:2px solid #153b63}
.summary{display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:900;color:#153b63}
.small{font-size:12px;color:#555;margin-top:4px;line-height:1.4}
.quickGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.quickCard{background:#f1f5f9;border-radius:11px;padding:8px;text-align:center;font-weight:900;font-size:12px;color:#153b63}
.resetBtn{border:0;border-radius:11px;background:#64748b;color:white;font-weight:900;padding:10px;width:100%;margin-top:7px}
.locBtn{width:100%;border:0;border-radius:11px;background:#153b63;color:#fff;font-weight:900;padding:11px;margin-top:7px}
.gpsBox{margin-top:8px;border:2px solid #d9e1ec;border-radius:13px;padding:9px;background:#f8fafc;font-size:14px;font-weight:800;line-height:1.6}
.gpsIn{color:#166534}
.gpsOut{color:#b91c1c}
.gpsNear{color:#153b63}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;font-size:12px}
.legend span{background:#f0f3f8;border-radius:999px;padding:5px 8px}
.searchBox{width:100%;border:2px solid #153b63;border-radius:12px;padding:11px;font-size:16px;font-weight:800;margin-top:8px}
.addrWrap{max-height:42vh;overflow:auto;border:1px solid #d9e1ec;border-radius:12px;margin-top:8px}
.addrHeader,.addrRow{display:grid;grid-template-columns:54px 82px 1.2fr 1fr 102px;gap:4px;align-items:center}
.addrHeader{position:sticky;top:0;background:#153b63;color:white;font-size:12px;font-weight:900;padding:7px 6px;z-index:3}
.addrRow{min-height:38px;padding:5px 6px;border-bottom:1px solid #edf1f7;background:white;font-size:13px}
.addrRow:nth-child(even){background:#f8fafc}
.addrRow.active{outline:3px solid #153b63;background:#eef6ff}
.seq{color:#64748b;font-weight:800;text-align:center}
.no{font-size:17px;font-weight:900;color:#153b63;white-space:nowrap}
.road{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.name{color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.statusBtns{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.statusBtns button{border:0;border-radius:7px;padding:5px 2px;font-weight:900;font-size:11px}
.done{background:#dff5e5}.absent{background:#fff1c7}.reject{background:#ffe0e0}.empty{background:#e5e7eb}
.marker-label{background:white;border:2px solid #153b63;color:#153b63;border-radius:999px;padding:3px 6px;font-size:12px;font-weight:900;box-shadow:0 2px 8px rgba(0,0,0,.25);white-space:nowrap}
.marker-done{border-color:#16a34a;color:#166534;background:#dcfce7}
.marker-absent{border-color:#f59e0b;color:#92400e;background:#fef3c7}
.marker-reject{border-color:#dc2626;color:#991b1b;background:#fee2e2}
.marker-empty{border-color:#111827;color:#111827;background:#e5e7eb}
.areaNameLabel{background:rgba(21,59,99,.92);color:white;border-radius:999px;padding:7px 12px;font-size:14px;font-weight:900;box-shadow:0 3px 10px rgba(0,0,0,.25)}
@media(max-width:700px){
 .tabs{grid-template-columns:repeat(2,1fr)}
 #map{height:42vh;min-height:300px}
 .addrHeader,.addrRow{grid-template-columns:38px 74px 1fr 0px 92px}
 .name{display:none}
 .addrHeader div:nth-child(4){display:none}
 .addrRow div:nth-child(4){display:none}
 .statusBtns button{font-size:10px;padding:5px 1px}
}
</style>
</head>
<body>
<header>
  인주회중 야외봉사 앱
  <div class="sub">실사용 통합판 · 지도 · GPS · 방문주소록 · 상태저장</div>
</header>
<div class="wrap">
  <div class="panel">
    <div class="tabs" id="tabs"></div>
    <div class="quickGrid">
      <div class="quickCard">① 구역선택</div>
      <div class="quickCard">② GPS시작</div>
      <div class="quickCard">③ 주소방문</div>
      <div class="quickCard">④ 상태저장</div>
    </div>
  </div>
  <div class="panel">
    <div class="summary"><div id="areaTitle"></div><div id="progress"></div></div>
    <div class="small">지도 밑 주소록을 많이 보이게 만들었습니다. 주소록 행을 누르면 지도가 그 건물로 이동합니다.</div>
    <button class="locBtn" onclick="startGps()">📍 GPS 추적 시작</button>
    <div class="gpsBox" id="gpsStatus">
      GPS 대기 중입니다. 버튼을 누르면 현재 위치와 가장 가까운 건물번호가 표시됩니다.
    </div>
    <button class="resetBtn" onclick="resetCurrentArea()">현재 구역 방문기록 초기화</button>
  </div>
  <div class="panel">
    <div id="map"></div>
    <div class="legend"><span>🟦 구역 바탕색</span><span>🟢 완료</span><span>🟡 부재</span><span>🔴 거절</span><span>⚫ 폐가/기타</span></div>
  </div>
  <div class="panel">
    <div class="summary"><div>방문 주소록</div><div id="countText"></div></div>
    <input class="searchBox" id="search" placeholder="건물번호·길이름·이름 검색 예: 99, 폐가, 209" oninput="renderAddressBook()">
    <div class="addrWrap">
      <div class="addrHeader"><div>순</div><div>건물</div><div>주소</div><div>이름/메모</div><div>상태</div></div>
      <div id="addrList"></div>
    </div>
  </div>
</div>

let currentAreaName = Object.keys(areas)[0];
let map, polygonLayer, markerLayer, labelLayer, myLocationMarker, selectedKey="";
function keyOf(h){return currentAreaName+"|"+h.seq+"|"+h.road+"|"+h.no}
function getSaved(){try{return JSON.parse(localStorage.getItem("injuDenseStatus")||"{}")}catch(e){return {}}}
function saveStatus(h,status){const s=getSaved();s[keyOf(h)]=status;localStorage.setItem("injuDenseStatus",JSON.stringify(s));}
function getStatus(h){const s=getSaved();return s[keyOf(h)] ?? h.status ?? ""}
function statusText(st){return st==="done"?"완료":st==="absent"?"부재":st==="reject"?"거절":st==="empty"?"기타":"미방문"}
function markerClass(st){return st==="done"?"marker-done":st==="absent"?"marker-absent":st==="reject"?"marker-reject":st==="empty"?"marker-empty":""}
function init(){
 map=L.map("map").setView(areas[currentAreaName].center,17);
 L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:20,attribution:"© OpenStreetMap"}).addTo(map);
 polygonLayer=L.layerGroup().addTo(map); markerLayer=L.layerGroup().addTo(map); labelLayer=L.layerGroup().addTo(map);
 renderTabs(); renderArea();
}
function renderTabs(){
 const tabs=document.getElementById("tabs"); tabs.innerHTML="";
 Object.keys(areas).forEach(name=>{const b=document.createElement("button");b.className="tab"+(name===currentAreaName?" active":"");b.textContent=name;b.onclick=()=>{currentAreaName=name;selectedKey="";renderTabs();renderArea();};tabs.appendChild(b);});
}
function centerOf(poly){let a=0,b=0;poly.forEach(p=>{a+=p[0];b+=p[1];});return [a/poly.length,b/poly.length]}
function renderArea(){
 const area=areas[currentAreaName];
 document.getElementById("areaTitle").textContent=currentAreaName;
 polygonLayer.clearLayers(); markerLayer.clearLayers(); labelLayer.clearLayers(); if(gpsLine){map.removeLayer(gpsLine); gpsLine=null;}
 const poly=L.polygon(area.polygon,{color:area.color,weight:5,fillColor:area.fill,fillOpacity:.42}).addTo(polygonLayer);
 L.marker(centerOf(area.polygon),{icon:L.divIcon({className:"",html:`<div class="areaNameLabel">${currentAreaName}</div>`,iconSize:null})}).addTo(labelLayer);
 area.houses.forEach(h=>{
   const st=getStatus(h);
   const icon=L.divIcon({className:"",html:`<div class="marker-label ${markerClass(st)}">${h.no}</div>`,iconSize:null});
   L.marker([h.lat,h.lng],{icon}).addTo(markerLayer).bindPopup(`<b>${h.road} ${h.no}</b><br>${h.name||"-"}<br>상태: ${statusText(st)}`);
 });
 map.fitBounds(poly.getBounds(),{padding:[24,24]});
 renderAddressBook(); updateProgress();
}
function renderAddressBook(){
 const q=(document.getElementById("search").value||"").trim().toLowerCase();
 const list=document.getElementById("addrList"); list.innerHTML="";
 const area=areas[currentAreaName];
 let shown=0;
 area.houses.forEach(h=>{
   const text=(h.no+" "+h.road+" "+(h.name||"")).toLowerCase();
   if(q && !text.includes(q)) return;
   shown++;
   const st=getStatus(h);
   const row=document.createElement("div");
   row.className="addrRow"+(selectedKey===keyOf(h)?" active":"");
   row.innerHTML=`
    <div class="seq">${h.seq}</div>
    <div class="no">${h.no}</div>
    <div class="road">${h.road} ${h.no}</div>
    <div class="name">${h.name||""}</div>
    <div class="statusBtns">
      <button class="done" onclick="setRowStatus(event,${h.seq},'done')">완</button>
      <button class="absent" onclick="setRowStatus(event,${h.seq},'absent')">부</button>
      <button class="reject" onclick="setRowStatus(event,${h.seq},'reject')">거</button>
      <button class="empty" onclick="setRowStatus(event,${h.seq},'empty')">기</button>
    </div>`;
   row.onclick=()=>{selectedKey=keyOf(h);map.setView([h.lat,h.lng],19);renderAddressBook();};
   list.appendChild(row);
 });
 document.getElementById("countText").textContent=`표시 ${shown} / 전체 ${area.houses.length}`;
}
function setRowStatus(e,seq,status){e.stopPropagation();const h=areas[currentAreaName].houses.find(x=>x.seq===seq);saveStatus(h,status);renderArea();}
function updateProgress(){
 const area=areas[currentAreaName];let done=0,visited=0;
 area.houses.forEach(h=>{const st=getStatus(h);if(st==="done")done++;if(st)visited++;});
 const pct=Math.round(done/area.houses.length*100);
 document.getElementById("progress").textContent=`완료 ${done}/${area.houses.length} · ${pct}%`;
}
let gpsWatchId=null, gpsLine=null;

function distanceMeters(lat1,lng1,lat2,lng2){
 const R=6371000;
 const dLat=(lat2-lat1)*Math.PI/180;
 const dLng=(lng2-lng1)*Math.PI/180;
 const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
 return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function pointInPolygon(point, polygon){
 const x=point[1], y=point[0];
 let inside=false;
 for(let i=0,j=polygon.length-1;i<polygon.length;j=i++){
   const xi=polygon[i][1], yi=polygon[i][0];
   const xj=polygon[j][1], yj=polygon[j][0];
   const intersect=((yi>y)!=(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
   if(intersect) inside=!inside;
 }
 return inside;
}

function nearestHouse(lat,lng){
 const area=areas[currentAreaName];
 let best=null, bestD=Infinity;
 area.houses.forEach(h=>{
   const d=distanceMeters(lat,lng,h.lat,h.lng);
   if(d<bestD){best=h;bestD=d;}
 });
 return {house:best, dist:bestD};
}

function startGps(){
 if(!navigator.geolocation){
   alert("이 기기에서는 GPS를 사용할 수 없습니다.");
   return;
 }
 if(gpsWatchId!==null){
   navigator.geolocation.clearWatch(gpsWatchId);
   gpsWatchId=null;
 }
 document.getElementById("gpsStatus").innerHTML="GPS 위치를 확인하는 중입니다...";
 gpsWatchId=navigator.geolocation.watchPosition(updateGps, gpsError, {
   enableHighAccuracy:true,
   maximumAge:3000,
   timeout:10000
 });
}

function updateGps(pos){
 const lat=pos.coords.latitude;
 const lng=pos.coords.longitude;
 const acc=Math.round(pos.coords.accuracy || 0);
 const area=areas[currentAreaName];
 const inside=pointInPolygon([lat,lng], area.polygon);
 const near=nearestHouse(lat,lng);

 if(myLocationMarker) map.removeLayer(myLocationMarker);
 myLocationMarker=L.circleMarker([lat,lng],{
   radius:9,color:"#2563eb",fillColor:"#60a5fa",fillOpacity:.95,weight:3
 }).addTo(map).bindPopup("현재 위치");

 if(gpsLine) map.removeLayer(gpsLine);
 if(near.house){
   gpsLine=L.polyline([[lat,lng],[near.house.lat,near.house.lng]],{
     color:"#153b63",
     weight:3,
     dashArray:"6,6"
   }).addTo(map);
 }

 const inText = inside
   ? `<span class="gpsIn">🟢 현재 ${currentAreaName} 구역 안입니다.</span>`
   : `<span class="gpsOut">🔴 현재 선택한 구역 밖입니다.</span>`;

 const nearText = near.house
   ? `<span class="gpsNear">가장 가까운 건물: <b>${near.house.road} ${near.house.no}</b> · 약 <b>${Math.round(near.dist)}m</b></span>`
   : "";

 const arrive = near.house && near.dist <= 20
   ? `<br><span class="gpsIn">✅ ${near.house.no} 근처에 도착했습니다.</span>`
   : "";

 document.getElementById("gpsStatus").innerHTML =
   `${inText}<br>${nearText}${arrive}<br><span style="color:#64748b">GPS 오차 약 ${acc}m</span>`;

 // 첫 추적 때 위치 중심 이동. 너무 자주 움직이면 불편하므로 확대 상태만 유지.
 if(map.getZoom()<17) map.setView([lat,lng],18);
}

function gpsError(err){
 let msg="GPS 위치를 가져오지 못했습니다.";
 if(err.code===1) msg="위치 권한을 허용해야 GPS가 작동합니다.";
 if(err.code===2) msg="현재 위치를 확인할 수 없습니다. 실외에서 다시 시도해 보세요.";
 if(err.code===3) msg="GPS 응답 시간이 초과되었습니다.";
 document.getElementById("gpsStatus").innerHTML=`<span class="gpsOut">⚠️ ${msg}</span>`;
}
function resetCurrentArea(){
 if(!confirm(currentAreaName+" 방문기록을 초기화할까요?")) return;
 const saved=getSaved();
 areas[currentAreaName].houses.forEach(h=>delete saved[keyOf(h)]);
 localStorage.setItem("injuDenseStatus",JSON.stringify(saved));
 renderArea();
}

init();
</script>
